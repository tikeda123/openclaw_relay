# Full example for a 3-node deployment:
# - Relay host
# - Control host (OptionABC001 equivalent)
# - Worker host 1 (OptionDEF002 equivalent)
# - Worker host 2 (OptionGHI003 equivalent)

[relay]
node_id = "relay-a"
state_dir = "../var/lib/openclaw-relay"
log_dir = "../var/log/openclaw-relay"
watch_dir = "../var/inbox/pending"
archive_dir = "../var/archive"
deadletter_dir = "../var/deadletter"
poll_interval_ms = 500
health_host = "127.0.0.1"
health_port = 18080

[endpoints.a]
display_name = "ControlGateway"
base_url = "http://127.0.0.1:31879"
agent_id = "main"
default_session_key = "agent:main:main"
token_env = "A_GATEWAY_TOKEN"
timeout_seconds = 30.0

[endpoints.a.tunnel]
ssh_host = "control-node"
ssh_user = "controluser"
ssh_key_path = "~/.ssh/id_ed25519_control"
ssh_connect_timeout_seconds = 10
strict_host_key_checking = true
local_port = 31879
remote_host = "127.0.0.1"
remote_port = 18789
token_config_path = "/home/controluser/.openclaw/openclaw.json"

[routing]
default_worker = "worker1"
transport = "responses"

[workers.worker1]
display_name = "WorkerGateway1"
base_url = "http://127.0.0.1:31901"
agent_id = "main"
default_session_key = "agent:main:main"
token_env = "WORKER1_GATEWAY_TOKEN"
timeout_seconds = 30.0

[workers.worker1.tunnel]
ssh_host = "worker-node"
ssh_user = "workeruser"
ssh_key_path = "~/.ssh/id_ed25519_worker1"
ssh_connect_timeout_seconds = 10
strict_host_key_checking = true
local_port = 31901
remote_host = "127.0.0.1"
remote_port = 18789
token_config_path = "/home/workeruser/.openclaw/openclaw.json"

[workers.worker2]
display_name = "WorkerGateway2"
base_url = "http://127.0.0.1:31902"
agent_id = "main"
default_session_key = "agent:main:main"
token_env = "WORKER2_GATEWAY_TOKEN"
timeout_seconds = 30.0

[workers.worker2.tunnel]
ssh_host = "worker-node-2"
ssh_user = "workeruser2"
ssh_key_path = "~/.ssh/id_ed25519_worker2"
ssh_connect_timeout_seconds = 10
strict_host_key_checking = true
local_port = 31902
remote_host = "127.0.0.1"
remote_port = 18789
token_config_path = "/home/workeruser2/.openclaw/openclaw.json"

[retry]
max_attempts_b = 5
max_attempts_a = 10
initial_backoff_ms = 1000
max_backoff_ms = 30000
jitter = true

[security]
require_private_ingress = true
allow_http_only_for_localhost = true
mask_secrets_in_logs = true

[mailbox_auth]
header_name = "Authorization"
scheme = "Bearer"

[mailbox_auth.tokens]
ControlGateway = "RELAY_MAILBOX_TOKEN_CONTROLGATEWAY"
WorkerGateway1 = "RELAY_MAILBOX_TOKEN_WORKERGATEWAY1"
WorkerGateway2 = "RELAY_MAILBOX_TOKEN_WORKERGATEWAY2"

[audit]
mode = "preview"
jsonl_path = "../var/log/openclaw-relay/a2a-audit.jsonl"

[behavior]
schema_version = "relay-message/v1"
default_ttl_seconds = 300
duplicate_policy = "suppress"
inject_notice_on_error = true

[rabbitmq]
host = "rabbitmq.internal"
port = 5672
virtual_host = "/openclaw-relay"
user_env = "RABBITMQ_USER"
password_env = "RABBITMQ_PASSWORD"
heartbeat_seconds = 30
blocked_connection_timeout_seconds = 30
prefetch_count = 4
queue_type = "quorum"
dispatch_exchange = "relay.dispatch.direct"
reply_exchange = "relay.reply.direct"
mailbox_exchange = "relay.mailbox.direct"
deadletter_exchange = "relay.dead.direct"
events_exchange = "relay.events.topic"
mailbox_queue_prefix = "relay.mailbox"
worker_queue_prefix = "relay.worker"
control_queue_prefix = "relay.control"
deadletter_queue_prefix = "relay.deadletter"

[rabbitmq.tls]
enabled = true
ca_path = "./certs/rabbitmq-ca.pem"
cert_path = "./certs/relay-client.pem"
key_path = "./certs/relay-client.key"
server_hostname = "rabbitmq.internal"
