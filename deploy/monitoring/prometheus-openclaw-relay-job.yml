alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: openclaw-relay
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:18080
        labels:
          service: openclaw-relay
          relay_node: relay-a

rule_files:
  - /etc/prometheus/rules/openclaw-relay-alerts.yml
