global:
  resolve_timeout: 5m

route:
  receiver: openclaw-relay-webhook
  group_by:
    - alertname
    - severity
    - worker
    - endpoint
    - target
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: openclaw-relay-webhook
    webhook_configs:
      - url: http://127.0.0.1:18080/api/alertmanager/webhook
        send_resolved: true
        max_alerts: 0

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - worker
      - endpoint
      - target
